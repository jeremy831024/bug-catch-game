<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐛 抓虫大冒险</title>
<link rel="stylesheet" href="style.css">
<style>
.home-header{text-align:center;padding:8px 0}
.home-header .bug-row{font-size:28px;letter-spacing:6px;margin-bottom:6px}
.home-header h1{font-size:28px;margin:2px 0;letter-spacing:2px}
.home-header .tagline{font-size:13px;opacity:.5;margin-bottom:10px}
.home-help{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:rgba(255,255,255,.25)}
.home-help kbd{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px}
.leaderboard{margin-top:8px;padding:10px;border-radius:10px;background:rgba(255,255,255,.03)}
.leaderboard h2{font-size:13px;margin-bottom:4px;text-align:center;opacity:.5}
.leaderboard .empty{text-align:center;opacity:.25;padding:8px;font-size:12px}
.score-row{display:flex;justify-content:space-between;padding:3px 6px;font-size:12px;opacity:.5}
</style>
</head>
<body>
<main class="page-center">
  <section class="glass-shell" style="padding:24px">
    <div class="home-header">
      <div class="bug-row">🐞 🦗 🦟 🦋 🕷️ 🐜 💩</div>
      <h1>🐛 抓虫大冒险</h1>
      <p class="tagline">带上抄子和铲子，去野外抓昆虫吧！</p>
    </div>

    <div style="width:100%">
      <a href="creator.html" style="display:block;width:100%;padding:12px;border-radius:12px;text-align:center;font-size:16px;font-weight:600;text-decoration:none;background:linear-gradient(135deg,#4caf50,#8bc34a);color:#fff;margin-bottom:8px;font-family:inherit">🎮 创造角色，开始冒险</a>
      <a href="collection.html" style="display:block;width:100%;padding:12px;border-radius:12px;text-align:center;font-size:16px;font-weight:600;text-decoration:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1);font-family:inherit">📖 昆虫图鉴</a>
    </div>

    <div class="leaderboard" id="leaderboard">
      <h2>🏆 排行榜</h2>
      <div id="scoreList"><div class="empty">还没有成绩，先去抓虫吧！</div></div>
    </div>

    <div class="home-help">
      <span><kbd>WASD</kbd> 移动</span>
      <span><kbd>E</kbd> 抄子</span>
      <span><kbd>Q</kbd> 铲子</span>
    </div>
  </section>
</main>

<script>
(function renderScores() {
  const list = document.getElementById('scoreList');
  try {
    const scores = JSON.parse(localStorage.getItem('bugRanks') || '[]')
      .sort((a,b) => b.score - a.score).slice(0,5);
    if (!scores.length) return;
    list.innerHTML = scores.map((s,i) => {
      const name = s.name || '探险家';
      const cnt = s.bugs ? Object.values(s.bugs).reduce((a,b)=>a+b,0) : 0;
      return `<div class="score-row"><span>${i+1}. ${name}</span><span>${s.score}分 · ${cnt}只</span></div>`;
    }).join('');
  } catch(e) {}
})();
</script>
</body>
</html>
