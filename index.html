<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐛 抓虫大冒险</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-center">
    <section class="glass-shell">
      <h1 class="brand-title">🐛 抓虫大冒险</h1>
      <p class="subtitle">带上抄子和小铲子，在草地、山路、池塘边寻找七种奇妙昆虫。</p>
      <nav class="actions" aria-label="主菜单">
        <a class="btn primary" href="game.html">🎮 进入游戏</a>
        <a class="btn" href="collection.html">📖 昆虫图鉴</a>
        <button class="btn" type="button" id="rankButton">🏆 排行榜</button>
      </nav>
      <div class="home-help" aria-label="操作说明">
        <span><kbd>WASD</kbd> / 方向键移动</span>
        <span><kbd>E</kbd> / 空格挥抄子</span>
        <span><kbd>Q</kbd> 站洞口挖洞</span>
      </div>
      <section class="leaderboard glass-panel" id="leaderboard" aria-live="polite">
        <h2>🏆 前 5 名</h2>
        <div id="scoreList"></div>
      </section>
    </section>
  </main>

  <script>
    const rankButton = document.getElementById("rankButton");
    const board = document.getElementById("leaderboard");
    const scoreList = document.getElementById("scoreList");

    function readScores() {
      try {
        const current = JSON.parse(localStorage.getItem("bugCatchLeaderboard") || "[]");
        const legacy = JSON.parse(localStorage.getItem("bugRanks") || "[]");
        return [...current, ...legacy.map((item) => ({
          score: item.score,
          count: item.bugs ? Object.values(item.bugs).reduce((sum, value) => sum + value, 0) : 0,
          date: item.date || item.time || Date.now(),
        }))];
      } catch {
        return [];
      }
    }

    function renderScores() {
      const scores = readScores().sort((a, b) => b.score - a.score).slice(0, 5);
      if (!scores.length) {
        scoreList.innerHTML = '<p class="empty">还没有成绩，先去草地抓几只虫吧。</p>';
        return;
      }
      scoreList.innerHTML = scores.map((item, index) => {
        const date = new Date(item.date || Date.now()).toLocaleDateString("zh-CN");
        const count = item.count || 0;
        return `<div class="score-row"><span>${index + 1}. ${date}</span><strong>${item.score} 分 · ${count} 只</strong></div>`;
      }).join("");
    }

    rankButton.addEventListener("click", () => {
      board.classList.toggle("open");
      renderScores();
    });
  </script>
</body>
</html>
