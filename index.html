<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐛 抓虫大冒险</title>
<link rel="stylesheet" href="style.css">
<style>
.home-header{text-align:center;padding:10px 0}
.home-header .bug-row{display:flex;justify-content:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.home-header .bug-row img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.08)}
.home-header h1{font-size:30px;margin:4px 0;letter-spacing:2px}
.home-header .tagline{font-size:13px;opacity:.5;margin-bottom:12px}
.actions{display:flex;flex-direction:column;gap:8px;margin:12px 0}
.actions .btn{padding:10px 12px;border-radius:14px;text-align:center;font-size:15px;font-weight:600;text-decoration:none;transition:.2s;min-height:auto}
.actions .btn-primary{background:linear-gradient(135deg,#4caf50,#8bc34a);color:#fff;min-height:auto}
.actions .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(76,175,80,.3)}
.actions .btn-secondary{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.1);min-height:auto}
.actions .btn-secondary:hover{background:rgba(255,255,255,.12)}
.actions .row{display:flex;gap:8px}
.actions .row .btn{flex:1}
.home-help{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;padding:8px 0;font-size:11px;color:rgba(255,255,255,.3)}
.home-help kbd{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px}
.leaderboard{margin-top:8px;padding:12px;border-radius:12px;background:rgba(255,255,255,.04)}
.leaderboard h2{font-size:14px;margin-bottom:6px;text-align:center;opacity:.6}
.score-row{display:flex;justify-content:space-between;padding:4px 8px;font-size:13px;opacity:.6}
.rank-btn{background:none;border:none;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;padding:4px}
.rank-btn:hover{color:rgba(255,255,255,.5)}
</style>
</head>
<body>
<main class="page-center">
  <section class="glass-shell">
    <div class="home-header">
      <div class="bug-row" style="font-size:28px;letter-spacing:6px">
        🦗 🦟 🪲 🦋 🦗 🕷️ 💩
      </div>
      <h1>🐛 抓虫大冒险</h1>
      <p class="tagline">带上抄子和铲子，去野外抓昆虫吧！</p>
    </div>

    <div class="actions">
      <a class="btn btn-primary" href="creator.html">🎮 创造角色，开始冒险</a>
      <div class="row">
        <a class="btn btn-secondary" href="collection.html">📖 图鉴</a>
        <button class="btn btn-secondary" id="rankButton">🏆 排行</button>
      </div>
    </div>

    <div class="home-help">
      <span><kbd>WASD</kbd> 移动</span>
      <span><kbd>E</kbd> 抄子抓虫</span>
      <span><kbd>Q</kbd> 铲子挖洞</span>
    </div>

    <div class="leaderboard" id="leaderboard" style="display:none">
      <h2>🏆 排行榜</h2>
      <div id="scoreList"></div>
    </div>

    <div style="text-align:center;margin-top:6px">
      <button class="rank-btn" id="rankToggle">🏆 查看排行榜</button>
    </div>
  </section>
</main>

<script>
document.getElementById('rankToggle').addEventListener('click', () => {
  const b = document.getElementById('leaderboard');
  b.style.display = b.style.display === 'none' ? '' : 'none';
  if (b.style.display !== 'none') renderScores();
});

function renderScores() {
  const list = document.getElementById('scoreList');
  try {
    const scores = JSON.parse(localStorage.getItem('bugRanks') || '[]')
      .sort((a,b) => b.score - a.score).slice(0,5);
    if (!scores.length) { list.innerHTML = '<div style="text-align:center;opacity:.3;padding:8px">还没有成绩</div>'; return; }
    list.innerHTML = scores.map((s,i) => {
      const name = s.name || '探险家';
      const cnt = s.bugs ? Object.values(s.bugs).reduce((a,b)=>a+b,0) : 0;
      return `<div class="score-row"><span>${i+1}. ${name}</span><strong>${s.score}分 · ${cnt}只</strong></div>`;
    }).join('');
  } catch { list.innerHTML = ''; }
}
</script>
</body>
</html>
