<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐛 抓虫大冒险</title>
<link rel="stylesheet" href="style.css?v=2">
<style>
.home-header{text-align:center;padding:8px 0}
.home-header .bug-row{font-size:28px;letter-spacing:6px;margin-bottom:6px}
.home-header h1{font-size:28px;margin:2px 0;letter-spacing:2px}
.home-header .tagline{font-size:13px;opacity:.5;margin-bottom:10px}
.home-help{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;padding:6px 0;font-size:11px;color:rgba(255,255,255,.25)}
.home-help kbd{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px}
.leaderboard{margin-top:12px;padding:12px;border-radius:12px;background:rgba(255,255,255,.08)}
.leaderboard h2{font-size:14px;margin-bottom:6px;text-align:center;opacity:.8}
.leaderboard .empty{text-align:center;opacity:.6;padding:12px;font-size:14px}
.score-row{display:flex;justify-content:space-between;padding:5px 10px;font-size:14px;opacity:.8}
.rank-tab{padding:3px 10px;border-radius:8px;border:none;font-size:11px;cursor:pointer;background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);transition:.15s;font-family:inherit}
.rank-tab.active{background:rgba(255,255,255,.14);color:#fff}
.rank-tab:hover{background:rgba(255,255,255,.1)}
</style>
</head>
<body>
<main class="page-center">
  <section class="glass-shell" style="padding:24px">
    <div class="home-header">
      <div class="bug-row">🐞 🦗 🦟 🦋 🕷️ 🐜 💩</div>
      <h1>🐛 抓虫大冒险</h1>
      <p class="tagline">带上抄子和铲子，去野外抓昆虫吧！</p>
    </div>

    <div style="width:100%">
      <a href="creator.html" style="display:block;width:100%;padding:12px;border-radius:12px;text-align:center;font-size:16px;font-weight:600;text-decoration:none;background:linear-gradient(135deg,#4caf50,#8bc34a);color:#fff;margin-bottom:8px;font-family:inherit">🎮 开始抓虫冒险</a>
      <button id="rankToggle" type="button" style="display:block;width:100%;padding:12px;border-radius:12px;text-align:center;font-size:16px;font-weight:600;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.14);font-family:inherit;margin-bottom:8px;cursor:pointer">🏆 排行榜</button>
      <a href="collection.html" style="display:block;width:100%;padding:12px;border-radius:12px;text-align:center;font-size:16px;font-weight:600;text-decoration:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1);font-family:inherit">📖 昆虫图鉴</a>
    </div>

    <div class="leaderboard" id="leaderboard" style="display:none">
      <h2 style="font-size:13px;margin-bottom:6px;text-align:center;opacity:.6">🏆 排行榜</h2>
      <div style="display:flex;gap:4px;margin-bottom:6px;justify-content:center;flex-wrap:wrap">
        <button class="rank-tab active" data-rank="score">总分</button>
        <button class="rank-tab" data-rank="grasshopper">🦗蚂蚱</button>
        <button class="rank-tab" data-rank="mantis">🦟螳螂</button>
        <button class="rank-tab" data-rank="beetle">🪲独角仙</button>
        <button class="rank-tab" data-rank="butterfly">🦋蝴蝶</button>
        <button class="rank-tab" data-rank="cicada">🦗知了</button>
      </div>
      <div id="scoreList"><div class="empty">还没有成绩，先去抓虫吧！</div></div>
    </div>

    <div class="home-help">
      <span><kbd>WASD</kbd> 移动</span>
      <span><kbd>E</kbd> 抄子</span>
      <span><kbd>Q</kbd> 铲子</span>
    </div>
  </section>
</main>

<script>
const BUG_NAMES = {grasshopper:'蚂蚱',mantis:'螳螂',beetle:'独角仙',butterfly:'蝴蝶',cicada:'知了'};

function renderScores(rankType) {
  const list = document.getElementById('scoreList');
  try {
    let scores = JSON.parse(localStorage.getItem('bugCatchLeaderboard') || '[]');
    
    if (!scores.length) {
      scores = [{name:'🎮 先玩一局',score:0,bugs:{}}];
    }
    
    let sorted;
    if (rankType === 'score' || !rankType) {
      // 总分排行
      sorted = [...scores].sort((a,b) => (b.score || 0) - (a.score || 0)).slice(0,5);
      list.innerHTML = sorted.map((s,i) => {
        const name = s.name || '探险家';
        const cnt = s.bugs ? Object.values(s.bugs).reduce((a,b)=>a+b,0) : 0;
        const score = s.score || 0;
        return `<div class="score-row"><span>${i+1}. ${name}</span><span>${score}分 · ${cnt}只</span></div>`;
      }).join('');
    } else {
      // 某类虫子捕获排行
      const bugLabel = BUG_NAMES[rankType] || rankType;
      sorted = scores.filter(s => s.bugs && s.bugs[rankType])
        .sort((a,b) => (b.bugs[rankType]||0) - (a.bugs[rankType]||0))
        .slice(0,5);
      if (!sorted.length) {
        list.innerHTML = '<div class="empty">还没有人抓到' + bugLabel + '</div>';
        return;
      }
      list.innerHTML = sorted.map((s,i) => {
        const name = s.name || '探险家';
        const cnt = s.bugs[rankType] || 0;
        return `<div class="score-row"><span>${i+1}. ${name}</span><span>${bugLabel} ×${cnt}</span></div>`;
      }).join('');
    }
  } catch(e) {}
}

// 排行榜Tab切换
document.querySelectorAll('.rank-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.rank-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderScores(tab.dataset.rank);
  });
});

document.getElementById('rankToggle').addEventListener('click', () => {
  const leaderboard = document.getElementById('leaderboard');
  const visible = leaderboard.style.display === 'block';
  leaderboard.style.display = visible ? 'none' : 'block';
  if (!visible) renderScores(document.querySelector('.rank-tab.active')?.dataset.rank || 'score');
});
</script>
</body>
</html>
