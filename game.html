<!DOCTYPE html>
<html lang="zh-CN" class="game-full" style="overflow:hidden;position:fixed;inset:0;width:100%;height:100%">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐛 抓虫大冒险 - 游戏</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body { overflow: hidden !important; position: fixed !important; width: 100% !important; height: 100% !important; max-height: 100% !important; margin: 0 !important; padding: 0 !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; }
    .game-shell { overflow: hidden !important; max-height: 100vh !important; }
    .canvas-wrap { overflow: hidden !important; }
    canvas { outline: none; }
  </style>
  <script defer src="game.js"></script>
</head>
<body class="game-full" style="overflow:hidden;position:fixed;inset:0;width:100%;height:100%">
  <div class="game-shell" style="overflow:hidden">
    <div class="canvas-wrap" id="canvasWrap" style="position:relative">
      <canvas id="gameCanvas" width="960" height="640" tabindex="0"></canvas>
      <div id="loadStatus" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;background:rgba(0,0,0,0.5);z-index:10">🐛 加载中...</div>
      
      <!-- HUD 浮层 -->
      <div style="position:absolute;top:8px;left:8px;right:8px;z-index:5;display:flex;gap:10px;align-items:center;padding:7px 12px;border:3px solid #56351f;border-radius:6px;background:#f6df9f;color:#4b2f1c;font-size:13px;box-shadow:inset 0 -4px 0 rgba(86,53,31,.16),0 4px 0 rgba(86,53,31,.22)">
        <span>⭐ <span id="scoreDisplay">0</span></span>
        <span>💪 <span id="staminaText">100</span></span>
        <div style="width:80px;height:8px;background:#8b5a2b;border:2px solid #56351f;border-radius:2px;overflow:hidden"><div id="staminaBar" style="width:100%;height:100%;border-radius:0;background:linear-gradient(90deg,#5aa34d,#f2c45c,#d85b6f);transition:width .3s"></div></div>
        <span id="poisonArea" style="display:none">🟡 <span id="poisonBar" style="width:40px;height:8px;display:inline-block;background:#8b5a2b;border:2px solid #56351f;border-radius:2px;overflow:hidden;vertical-align:middle"><span style="display:block;height:100%;background:#8a4ebf;border-radius:0"></span></span></span>
        <span id="statusBadge" style="padding:1px 8px;border:2px solid #56351f;border-radius:4px;font-size:11px;background:#d8ef99;color:#314f2f">🟢 正常</span>
        <span style="margin-left:auto" id="bugCount">🐛 0只</span>
        <span id="timerDisplay">⏱ 0s</span>
        <a href="index.html" style="color:#4b2f1c;text-decoration:none;font-size:13px;font-weight:700">✕</a>
      </div>

      <!-- 操作提示 -->
      <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:12px;padding:5px 14px;border:3px solid #56351f;border-radius:6px;background:#f6df9f;box-shadow:inset 0 -3px 0 rgba(86,53,31,.16);font-size:10px;color:#4b2f1c;pointer-events:none">
        <span><kbd>WASD</kbd> 移动</span>
        <span><kbd>E</kbd> 抄子</span>
        <span><kbd>Q</kbd> 铲子</span>
        <span><kbd>R</kbd> 退出</span>
      </div>

      <div class="game-over-overlay" id="gameOver">
        <h2>🎮 游戏结束</h2>
        <div class="final-score" id="finalScore">0</div>
        <div style="font-size:14px;opacity:.7">最终得分</div>
        <div id="caughtSummary" style="font-size:13px;opacity:.5"></div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn primary" id="replayButton">🔄 再来一局</button>
          <a class="btn" href="index.html">🏠 首页</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
