<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐛 抓虫大冒险 - 游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
width:100%;height:100%;overflow:hidden;
background:#1a2a1a;
font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
}
body{display:flex;flex-direction:column}
.game-wrap{
position:relative;flex:1;display:flex;flex-direction:column;
background:rgba(0,0,0,0.2);
}
canvas{
display:block;flex:1;width:100%;height:100%;min-height:0;
background:#4a7a3a;cursor:crosshair;
object-fit:contain;
}
.hud{
display:flex;align-items:center;gap:12px;padding:6px 14px;color:#fff;font-size:13px;
background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);flex-shrink:0;
}
.hud-item{display:flex;align-items:center;gap:5px}
.hud-bar{width:100px;height:7px;background:rgba(255,255,255,0.12);border-radius:4px;overflow:hidden}
.hud-fill{height:100%;border-radius:4px;transition:width .3s}
.hud-stamina .hud-fill{background:linear-gradient(90deg,#4caf50,#ffd700,#f44336)}
.hud-poison .hud-fill{background:#ab47bc}
.hud-score{font-size:20px;font-weight:700;margin-left:auto}
.status-badge{padding:2px 10px;border-radius:8px;font-size:12px}
.status-ok{background:rgba(76,175,80,.2);color:#81c784}
.status-poison{background:rgba(171,71,188,.2);color:#ce93d8}
.help-bar{display:flex;gap:20px;margin-top:6px;font-size:11px;color:rgba(255,255,255,.35);flex-wrap:wrap}
.help-bar kbd{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:4px;font-size:11px;font-family:inherit}
.game-over-overlay{
position:absolute;inset:0;z-index:10;display:none;
align-items:center;justify-content:center;flex-direction:column;gap:16px;
background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:0;color:#fff;
}
.game-over-overlay.show{display:flex}
.game-over-overlay h2{font-size:32px}
.game-over-overlay .final-score{font-size:48px;font-weight:700;color:#ffd700}
.game-over-overlay .btn{
padding:10px 28px;border-radius:14px;border:none;font-size:16px;cursor:pointer;
background:rgba(255,255,255,.15);color:#fff;backdrop-filter:blur(4px);transition:.2s;
}
.game-over-overlay .btn:hover{background:rgba(255,255,255,.25);transform:translateY(-1px)}
.game-over-overlay .btn.primary{background:rgba(76,175,80,.3)}
</style>
</head>
<body>
<div class="game-wrap" style="position:relative">
  <canvas id="gc" width="960" height="640"></canvas>
  <div class="hud">
    <div class="hud-item">⭐ <span id="scoreDisplay" style="font-size:18px;font-weight:700">0</span></div>
    <div class="hud-item">💪<div class="hud-bar hud-stamina"><div class="hud-fill" id="staminaBar" style="width:100%"></div></div><span id="staminaText" style="font-size:11px;opacity:.7">100</span></div>
    <div class="hud-item" id="poisonArea" style="display:none">🟡<div class="hud-bar hud-poison"><div class="hud-fill" id="poisonBar"></div></div></div>
    <span id="statusBadge" class="status-badge status-ok">🟢 正常</span>
    <span id="bugCount" style="font-size:12px;opacity:.5">🐛 0只</span>
    <span style="font-size:12px;opacity:.4" id="timerDisplay">⏱ 0s</span>
  </div>
  <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:5;
    display:flex;gap:12px;padding:4px 14px;border-radius:20px;
    background:rgba(0,0,0,0.35);backdrop-filter:blur(8px);font-size:10px;color:rgba(255,255,255,0.5);
    pointer-events:none;white-space:nowrap;">
    <span><kbd>WASD</kbd> 移动</span>
    <span><kbd>E</kbd> 抄子</span>
    <span><kbd>Q</kbd> 铲子</span>
    <span><kbd>R</kbd> 退出</span>
  </div>
  <!-- Game Over -->
  <div class="game-over-overlay" id="gameOver">
    <h2>🎮 游戏结束</h2>
    <div class="final-score" id="finalScore">0</div>
    <div style="font-size:14px;opacity:.7">最终得分</div>
    <div id="caughtSummary" style="font-size:13px;opacity:.6"></div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button class="btn primary" onclick="location.reload()">🔄 再来一局</button>
      <button class="btn" onclick="location.href='index.html'">🏠 返回首页</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// 🐛 抓虫大冒险 — 游戏引擎 v2
// ═══════════════════════════════════════

const c=document.getElementById('gc'),ctx=c.getContext('2d');
const W=960,H=640,T=32,COLS=30,ROWS=20;
let gameTime=0,keys={},lastT=0,bugs=[],floats=[],holeTimer=0,score=0,bugsCaught={};
let stamina=100,poisoned=0,gameOver=false,frameCount=0,holes=[];

const TERRAIN={GRASS:0,MTN:1,POND:2};
const tCol={0:['#5a9a4a','#6aaa5a','#4a8a3a'],1:['#8a7a6a','#9a8a7a','#7a6a5a'],2:['#4a8aba','#5a9aca','#3a7aaa']};
const tSpd={0:1,1:.6,2:0};

let map=[];

function genMap(){
  map=Array.from({length:ROWS},()=>Array(COLS).fill(0));
  for(let i=0;i<6;i++){
    let sx=8+Math.random()*12|0,sy=Math.random()*10|0;
    for(let j=0;j<7;j++){let x=sx+j+(Math.random()*2|0),y=sy+(j*.8|0)+(Math.random()*2|0);if(x<COLS&&y<ROWS)map[y][x]=1}
  }
  let px=20+Math.random()*4|0,py=3+Math.random()*4|0;
  for(let d=-1;d<=1;d++)for(let e=-1;e<=2;e++){let x=px+e,y=py+d;if(x>=0&&x<COLS&&y>=0&&y<ROWS)map[y][x]=2}
}

// ── 地形系统 ──
function gT(x,y){
  let tx=x/T|0,ty=y/T|0;
  if(tx<0||tx>=COLS||ty<0||ty>=ROWS)return 1;
  return map[ty][tx];
}
function gSp(tx,ty){return tx<0||tx>=COLS||ty<0||ty>=ROWS?0:tSpd[map[ty][tx]]||0}

// ── 洞系统 ──
function genHoles(){
  holes=[];
  for(let i=0;i<8;i++){
    let x,y,a=0;
    do{x=2+Math.random()*(COLS-4)|0;y=2+Math.random()*(ROWS-4)|0;a++}while(map[y][x]!==0&&a<30);
    if(map[y][x]===0){
      let styles=['土洞','草洞','树洞','花洞','网洞','粪洞'];
      holes.push({x,y,connected:Math.random()>.5,dbug:null,timer:0,
        style:styles[Math.random()*6|0]});
    }
  }
  // 连通洞成对出现
  let conn=holes.filter(h=>h.connected);
  for(let i=0;i<conn.length;i+=2){
    if(i+1<conn.length){
      conn[i].pair=conn[i+1];conn[i+1].pair=conn[i];
    }
  }
}

// ── 昆虫 ──
const BUGS=[
  {id:'hopper',name:'蚂蚱',spd:40,pts:10,fly:true,stm:30,sz:10,clr:'#7ab648',psn:false,desc:'会跳'},
  {id:'mantis',name:'螳螂',spd:35,pts:15,fly:true,stm:25,sz:12,clr:'#6a9a3a',psn:false,desc:'埋伏'},
  {id:'beetle',name:'独角仙',spd:20,pts:50,fly:true,stm:60,sz:14,clr:'#5a3a1a',psn:false,desc:'耐力好'},
  {id:'butterfly',name:'蝴蝶',spd:55,pts:30,fly:true,stm:20,sz:10,clr:'#e8a0d0',psn:false,desc:'飘忽'},
  {id:'cicada',name:'知了',spd:25,pts:20,fly:false,stm:0,sz:11,clr:'#3a5a2a',psn:false,desc:'鸣叫'},
  {id:'spider',name:'蜘蛛',spd:30,pts:25,fly:false,stm:0,sz:12,clr:'#2a2a2a',psn:true,desc:'有毒'},
  {id:'dung',name:'屎壳郎',spd:15,pts:-10,fly:false,stm:0,sz:13,clr:'#4a3a2a',psn:true,desc:'扣分'},
];
let spawnTimer=0;

function mkBug(type,edge){
  let b={...type,x:0,y:0,vx:0,vy:0,dir:Math.random()*6.28,spd:type.spd+Math.random()*8,
    flying:false,fStamina:type.stm,fMaxStm:type.stm,scared:false,mCt:Math.random()*100,
    jumping:false,jumpCt:0,hide:false,cicadaTimer:0,webX:0,webY:0,inHole:false};
  if(edge&&type.id==='cicada'){
    b.x=Math.random()<.5?10:W-10;b.y=20+Math.random()*(H-40);
  }else{
    let a=0;do{b.x=20+Math.random()*(W-40);b.y=20+Math.random()*(H-40);a++}while(gT(b.x,b.y)!==0&&a<40);
  }
  b.webX=b.x;b.webY=b.y;
  return b;
}

function spawnBug(){
  if(bugs.length>=15)return;
  let type=BUGS[Math.random()*BUGS.length|0];
  let edge=type.id==='cicada';
  let b=mkBug(type,edge);
  // 有概率在洞附近生成
  for(let h of holes){
    if(Math.random()<.15){
      b.x=h.x*T+T/2;b.y=h.y*T+T/2+10;break;
    }
  }
  bugs.push(b);
}

// ── 玩家 ──
const pl={
  x:3*T+16,y:3*T+16,sz:20,spd:120,dir:0,frame:0,moving:false,
  webX:0,webY:0,
};

// ── 音效 (Web Audio) ──
let aCtx=null;
function initAudio(){
  try{aCtx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
}
function playTone(freq,dur,type='sine',vol=.15){
  if(!aCtx)return;
  try{
    let o=aCtx.createOscillator(),g=aCtx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    g.gain.exponentialRampToValueAtTime(.001,aCtx.currentTime+dur);
    o.connect(g);g.connect(aCtx.destination);
    o.start();o.stop(aCtx.currentTime+dur);
  }catch(e){}
}
function sfxCatcher(){playTone(880,.15,'sine',.2);setTimeout(()=>playTone(1320,.1,'sine',.15),80)}
function sfxShovel(){playTone(150,.2,'triangle',.15)}
function sfxPoison(){playTone(220,.3,'sawtooth',.12);setTimeout(()=>playTone(180,.3,'sawtooth',.1),200)}
function sfxCicada(){playTone(4000,.05,'square',.05);setTimeout(()=>playTone(3800,.08,'square',.04),100)}

// ── 游戏逻辑 ──

function useNet(){
  if(poisoned||gameOver)return;
  let dx=Math.cos(pl.dir),dy=Math.sin(pl.dir);
  let nx=pl.x+dx*T,ny=pl.y+dy*T;
  for(let i=bugs.length-1;i>=0;i--){
    let b=bugs[i];
    if(b.hide)continue;
    let d=Math.hypot(b.x-nx,b.y-ny);
    if(d<T*.7){
      let isP=b.psn;
      score+=b.pts;
      bugsCaught[b.id]=(bugsCaught[b.id]||0)+1;
      addFloat(nx,ny,(b.pts>0?'+':'')+b.pts,b.pts>0?'#ffd700':'#ff4444');
      bugs.splice(i,1);
      sfxCatcher();
      if(isP)enterPoison();
      return;
    }
  }
  addFloat(pl.x,pl.y-10,'😅 没抓到','rgba(255,255,255,.5)');
}

function useShovel(){
  if(poisoned||gameOver)return;
  let tx=pl.x/T|0,ty=pl.y/T|0;
  let hi=holes.findIndex(h=>h.x===tx&&h.y===ty);
  if(hi<0){addFloat(pl.x,pl.y-10,'🔧 这里没有洞','rgba(255,255,255,.5)');return;}
  let h=holes[hi];
  // 查洞里有没有虫子 (使用 dbug 引用，比坐标匹配更可靠)
  let bi=h.dbug?bugs.indexOf(h.dbug):-1;
  if(!h.connected&&bi>=0){
    // 死路洞+有虫
    score+=30+bugs[bi].pts;
    bugsCaught[bugs[bi].id]=(bugsCaught[bugs[bi].id]||0)+1;
    if(bugs[bi].psn)enterPoison();
    addFloat(pl.x,pl.y-20,'🎉 挖到啦! +'+(30+bugs[bi].pts),'#ffd700');
    bugs.splice(bi,1);
    stamina=Math.max(0,stamina-10);
    holes.splice(hi,1);
    sfxShovel();
  }else if(!h.connected){
    stamina=Math.max(0,stamina-25);
    addFloat(pl.x,pl.y-20,'😰 空的... -25体力','#ff8c00');
    holes.splice(hi,1);
    sfxShovel();
  }else{
    stamina=Math.max(0,stamina-15);
    addFloat(pl.x,pl.y-20,'💥 破坏连通洞 -15体力','#ff5722');
    // 如果另一端的洞也在,一并移除
    if(h.pair){
      let pi=holes.findIndex(p=>p===h.pair);
      if(pi>=0)holes.splice(pi,1);
    }
    holes.splice(hi,1);
    sfxShovel();
  }
}

function enterPoison(){
  poisoned=8;statusBadge.textContent='🟡 中毒';
  statusBadge.className='status-badge status-poison';
  document.getElementById('poisonArea').style.display='flex';
  sfxPoison();
}

function addFloat(x,y,txt,clr){
  floats.push({x,y,txt,clr,life:1.5});
}

function update(dt){
  if(gameOver)return;
  gameTime+=dt;frameCount++;
  if(poisoned>0){
    poisoned-=dt;score-=5*dt;
    if(poisoned<=0){poisoned=0;statusBadge.textContent='🟢 正常';statusBadge.className='status-badge status-ok';
      document.getElementById('poisonArea').style.display='none';}
  }

  // 玩家
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])dy=-1;
  if(keys['s']||keys['arrowdown'])dy=1;
  if(keys['a']||keys['arrowleft'])dx=-1;
  if(keys['d']||keys['arrowright'])dx=1;
  pl.moving=dx||dy;
  if(pl.moving&&!poisoned){
    pl.dir=dx||dy?Math.atan2(dy,dx):pl.dir;
    let sr=stamina/100;
    let sm=sr>.7?1:sr>.4?.8:.6;
    let tx=pl.x/T|0,ty=pl.y/T|0;
    let tm=gSp(tx,ty);
    let ms=pl.spd*sm*tm*dt;
    let nx=pl.x+dx*ms,ny=pl.y+dy*ms;
    nx=Math.max(pl.sz,Math.min(W-pl.sz,nx));
    ny=Math.max(pl.sz,Math.min(H-pl.sz,ny));
    if(gT(nx,ny)!==2){pl.x=nx;pl.y=ny}
    stamina=Math.min(100,stamina+.5*dt);
    pl.frame+=dt*5;
  }else{
    stamina=Math.min(100,stamina+2*dt);
  }

  // 洞计时
  for(let h of holes){
    if(h.dbug){
      h.timer-=dt;
      if(h.timer<=0){
        // 虫子出洞
        let bi=bugs.findIndex(b=>b===h.dbug);
        if(bi>=0){
          bugs[bi].x=h.x*T+T/2;bugs[bi].y=h.y*T+T/2+20;
          bugs[bi].fStamina=Math.max(0,bugs[bi].fStamina-10);
          bugs[bi].mCt=10;
        }
        if(h.dbug)h.dbug.inHole=false;
        h.dbug=null;h.timer=0;
      }
    }
  }

  // 虫子
  for(let b of bugs){
    if(b.hide)continue;
    b.mCt+=dt;

    // 特殊行为
    if(b.id==='hopper'&&!b.jumping&&Math.random()<.01){
      b.jumping=true;b.jumpCt=.3;
      let a=Math.random()*6.28;b.vx=Math.cos(a)*b.spd*3;b.vy=Math.sin(a)*b.spd*3;
    }
    if(b.jumping){b.jumpCt-=dt;if(b.jumpCt<=0){b.jumping=false;b.vx=0;b.vy=0}}
    if(b.id==='mantis'&&!b.scared){
      // 静止半透明
      b.hide=Math.random()<.3;
    }else b.hide=false;
    if(b.id==='butterfly'&&b.flying){
      b.vy+=Math.sin(gameTime*5)*20*dt; // 飘忽
    }
    if(b.id==='cicada'){
      b.cicadaTimer+=dt;
      if(b.cicadaTimer>3+Math.random()*5){
        b.cicadaTimer=0;
        // "知了" 文字提示
        addFloat(b.x,b.y-15,'知了!','rgba(255,200,100,.8)');
        sfxCicada();
      }
    }

    let d2pl=Math.hypot(b.x-pl.x,b.y-pl.y);
    b.scared=d2pl<4*T&&!poisoned;
    if(b.scared){
      let ax=b.x-pl.x,ay=b.y-pl.y,l=Math.hypot(ax,ay)||1;
      b.vx+=(ax/l*b.spd*1.5-b.vx)*dt*3;
      b.vy+=(ay/l*b.spd*1.5-b.vy)*dt*3;
    }else if(!b.jumping){
      if(b.mCt>2+Math.random()*3){b.dir=Math.random()*6.28;b.mCt=0}
      b.vx+=((Math.cos(b.dir)*b.spd*.5)-b.vx)*dt*2;
      b.vy+=((Math.sin(b.dir)*b.spd*.5)-b.vy)*dt*2;
    }

    // 飞行
    if(b.fly&&b.fStamina>0&&Math.random()<.015){
      b.flying=true;
    }
    if(b.flying){
      b.fStamina-=3*dt;
      if(b.fStamina<=0){b.flying=false;b.fStamina=0}
    }else{
      b.fStamina=Math.min(b.fMaxStm,b.fStamina+1*dt);
    }

    let spd=b.flying?b.spd*1.5:b.spd;
    if(!b.jumping){
      b.x+=b.vx*dt;b.y+=b.vy*dt;
    }else{
      b.x+=b.vx*dt*3;b.y+=b.vy*dt*3;
    }
    if(b.x<5||b.x>W-5){b.vx*=-.5;b.x=Math.max(5,Math.min(W-5,b.x))}
    if(b.y<5||b.y>H-5){b.vy*=-.5;b.y=Math.max(5,Math.min(H-5,b.y))}
    if(gT(b.x,b.y)===2){b.vx*=-.5;b.vy*=-.5}

    // 进洞
    if(!b.inHole&&!b.jumping&&Math.random()<.005){
      for(let h of holes){
        let d=Math.hypot(b.x-(h.x*T+T/2),b.y-(h.y*T+T/2));
        if(d<T*1.5&&!h.dbug){
          h.dbug=b;b.inHole=true;b.holeX=h.x;b.holeY=h.y;
          h.timer=5+Math.random()*10;
          b.x=h.x*T+T/2;b.y=h.y*T+T/2+10;break;
        }
      }
    }
  }

  // 生成虫子
  spawnTimer-=dt;
  if(spawnTimer<=0&&bugs.length<15){
    spawnBug();spawnTimer=1.5+Math.random()*3;
  }

  // 浮动文字
  for(let i=floats.length-1;i>=0;i--){
    floats[i].life-=dt;floats[i].y-=30*dt;
    if(floats[i].life<=0)floats.splice(i,1);
  }

  // HUD
  document.getElementById('scoreDisplay').textContent=Math.round(score);
  document.getElementById('staminaBar').style.width=(stamina/100*100)+'%';
  document.getElementById('staminaText').textContent=Math.round(stamina);
  if(poisoned>0)document.getElementById('poisonBar').style.width=(poisoned/8*100)+'%';
  document.getElementById('bugCount').textContent='🐛 '+bugs.length+'只';
  document.getElementById('timerDisplay').textContent='⏱ '+Math.round(gameTime)+'s';

  // 游戏结束 (90秒)
  if(gameTime>90)endGame();
}

function endGame(){
  gameOver=true;
  document.getElementById('gameOver').classList.add('show');
  document.getElementById('finalScore').textContent=Math.round(score);
  let s=Object.entries(bugsCaught).map(([k,v])=>`${BUGS.find(b=>b.id===k)?.name||k}×${v}`).join(' ');
  document.getElementById('caughtSummary').textContent=s||'没有抓到虫子';
  // 存排行榜
  let ranks=JSON.parse(localStorage.getItem('bugRanks')||'[]');
  ranks.push({score:Math.round(score),time:Date.now(),bugs:{...bugsCaught}});
  ranks.sort((a,b)=>b.score-a.score);
  if(ranks.length>10)ranks=ranks.slice(0,10);
  localStorage.setItem('bugRanks',JSON.stringify(ranks));
}

// ═══════════════════════════════════════
// 渲染
// ═══════════════════════════════════════

function draw(){
  ctx.clearRect(0,0,W,H);

  // 地图
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    let t=map[y][x],cs=tCol[t]||tCol[0];
    ctx.fillStyle=cs[(x+y)%3];ctx.fillRect(x*T,y*T,T,T);
    if(t===1){
      ctx.fillStyle='rgba(120,110,100,.3)';ctx.beginPath();
      ctx.arc(x*T+16,y*T+16,4,0,7);ctx.fill();
    }
    if(t===2){
      ctx.fillStyle='rgba(100,200,255,.1)';
      ctx.beginPath();ctx.arc(x*T+16,y*T+16,8+Math.sin(gameTime*2+(x+y)*2)*3,0,7);ctx.stroke();
    }
  }

  // 洞
  for(let h of holes){
    let cx=h.x*T+16,cy=h.y*T+18;
    ctx.fillStyle='rgba(40,30,20,.6)';ctx.beginPath();ctx.ellipse(cx,cy,12,7,0,0,7);ctx.fill();
    ctx.fillStyle='rgba(20,15,10,.7)';ctx.beginPath();ctx.ellipse(cx,cy,7,4,0,0,7);ctx.fill();
    if(h.connected){
      ctx.fillStyle='rgba(100,255,150,.15)';ctx.beginPath();ctx.ellipse(cx,cy,14,9,0,0,7);ctx.fill();
    }
    // 洞内虫子
    if(h.dbug&&!gameOver){
      // 画虫子的眼睛从洞里露出来
      ctx.fillStyle='rgba(255,255,200,.5)';ctx.font='14px sans-serif';ctx.textAlign='center';
      ctx.fillText('👀',cx,cy-2);
      // 画个进度条显示剩余时间
      let pct = h.timer / (5+10);
      ctx.fillStyle='rgba(255,255,255,.15)';ctx.fillRect(cx-10,cy-7,20,3);
      ctx.fillStyle='rgba(255,200,100,.5)';ctx.fillRect(cx-10,cy-7,20*pct,3);
    }
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='7px sans-serif';ctx.textAlign='center';
    ctx.fillText(h.style,cx,cy+14);
  }

  // 虫子
  for(let b of bugs){
    if(b.hide)continue;
    ctx.globalAlpha=b.inHole?0.5:1;
    let bx=b.x,by=b.y-(b.flying?6:0);

    // 知了特殊绘制
    if(b.id==='cicada'){
      // 树
      ctx.fillStyle='#4a6a3a';ctx.fillRect(b.x-3,b.y-12,6,20);
      ctx.fillStyle='#5a8a3a';ctx.beginPath();
      ctx.arc(b.x,b.y-14,10,0,7);ctx.fill();
    }

    // 身体
    ctx.fillStyle=b.clr;
    if(b.id==='hopper'&&b.jumping)ctx.fillStyle='#8ac848';
    ctx.beginPath();ctx.ellipse(bx,by,b.sz,b.sz*.6,0,0,7);ctx.fill();

    // 腿
    if(!b.flying){
      ctx.strokeStyle=b.clr;ctx.lineWidth=1.5;
      for(let i=-1;i<=1;i+=1){
        if(i===0)continue;
        ctx.beginPath();ctx.moveTo(bx+i*b.sz*.3,by);
        ctx.lineTo(bx+i*b.sz*.7,by+b.sz*.5);ctx.stroke();
      }
    }
    // 翅膀
    if(b.flying){
      ctx.fillStyle='rgba(200,230,255,.35)';
      let w=Math.sin(gameTime*15)*.15;
      ctx.beginPath();ctx.ellipse(bx-b.sz*.4,by-b.sz*.3,b.sz*.5,b.sz*.2,-.3+w,0,7);ctx.fill();
      ctx.beginPath();ctx.ellipse(bx+b.sz*.4,by-b.sz*.3,b.sz*.5,b.sz*.2,.3+w,0,7);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // 玩家
  if(!gameOver){
    ctx.save();ctx.translate(pl.x,pl.y);
    // 身体
    ctx.fillStyle=poisoned?'#b080d0':'#f0c0a0';
    ctx.beginPath();ctx.arc(0,0,pl.sz,0,7);ctx.fill();
    // 头
    ctx.fillStyle=poisoned?'#c090e0':'#f0d0b0';
    ctx.beginPath();ctx.arc(0,-pl.sz*.3,pl.sz*.5,0,7);ctx.fill();
    // 帽子
    ctx.fillStyle='#d4a030';ctx.fillRect(-pl.sz*.5,-pl.sz*.7,pl.sz,pl.sz*.3);
    ctx.fillRect(-pl.sz*.6,-pl.sz*.5,pl.sz*1.2,pl.sz*.1);
    // 眼
    ctx.fillStyle='#333';ctx.beginPath();
    ctx.arc(-pl.sz*.2,-pl.sz*.35,2.5,0,7);ctx.arc(pl.sz*.2,-pl.sz*.35,2.5,0,7);ctx.fill();
    // 抄子
    let d2=pl.dir;
    ctx.strokeStyle='#8B4513';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(Math.cos(d2)*pl.sz*.5,Math.sin(d2)*pl.sz*.5);
    ctx.lineTo(Math.cos(d2)*(pl.sz+18),Math.sin(d2)*(pl.sz+18));ctx.stroke();
    ctx.strokeStyle='rgba(200,200,200,.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(Math.cos(d2)*(pl.sz+22),Math.sin(d2)*(pl.sz+22),8,0,7);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.08)';ctx.fill();
    ctx.restore();
  }

  // 浮动文字
  for(let f of floats){
    ctx.globalAlpha=f.life/1.5;ctx.fillStyle=f.clr;
    ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText(f.txt,f.x,f.y);
  }
  ctx.globalAlpha=1;

  // 中毒覆盖
  if(poisoned>0){ctx.fillStyle='rgba(150,50,200,.06)';ctx.fillRect(0,0,W,H)}
}

// ═══════════════════════════════════════
// 游戏循环
// ═══════════════════════════════════════

function loop(t){
  let dt=Math.min((t-lastT)/1000,.05);lastT=t;
  update(dt);draw();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════
// 输入
// ═══════════════════════════════════════

document.addEventListener('keydown',e=>{
  let k=e.key.toLowerCase();
  keys[k]=true;
  if('arrowup'===k)keys['arrowup']=true;
  if('arrowdown'===k)keys['arrowdown']=true;
  if('arrowleft'===k)keys['arrowleft']=true;
  if('arrowright'===k)keys['arrowright']=true;
  if(k==='e'||k===' '){e.preventDefault();useNet()}
  if(k==='q')useShovel();
  if(k==='r')location.href='index.html';
});

document.addEventListener('keyup',e=>{
  let k=e.key.toLowerCase();keys[k]=false;
  if('arrowup'===k)keys['arrowup']=false;
  if('arrowdown'===k)keys['arrowdown']=false;
  if('arrowleft'===k)keys['arrowleft']=false;
  if('arrowright'===k)keys['arrowright']=false;
});

// ═══════════════════════════════════════
// 初始化
// ═══════════════════════════════════════

// 响应式 Canvas
function resizeCanvas(){
  const wrap=document.querySelector('.game-wrap');
  const rect=wrap.getBoundingClientRect();
  // 保持 3:2 比例
  let w=rect.width-4,h=rect.height-40;
  let ratio=960/640;
  if(w/h>ratio){w=h*ratio}else{h=w/ratio}
  c.style.width=Math.floor(w)+'px';
  c.style.height=Math.floor(h)+'px';
  c.width=960;c.height=640; // 内部始终960x640
}
window.addEventListener('resize',resizeCanvas);

genMap();genHoles();
for(let i=0;i<5;i++)spawnBug();
spawnTimer=2;
initAudio();
setTimeout(resizeCanvas,50);
requestAnimationFrame(loop);
</script>
</body>
</html>
