<!DOCTYPE html>
<html lang="zh-CN" class="game-full" style="overflow:hidden;position:fixed;inset:0">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐛 抓虫大冒险 - 游戏</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="game.js?v=8"></script>
</head>
<body class="game-full">
  <div class="game-shell">
    <div class="canvas-wrap" id="canvasWrap" style="position:relative">
      <canvas id="gameCanvas" width="960" height="640"></canvas>
      
      <!-- HUD 浮层 -->
      <div style="position:absolute;top:8px;left:8px;right:8px;z-index:5;display:flex;gap:10px;align-items:center;padding:6px 12px;border-radius:12px;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);color:#fff;font-size:13px;">
        <span>⭐ <span id="scoreDisplay">0</span></span>
        <span>💪 <span id="staminaText">100</span></span>
        <div style="width:80px;height:6px;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden"><div id="staminaBar" style="width:100%;height:100%;border-radius:3px;background:linear-gradient(90deg,#4caf50,#ffd700,#f44336);transition:width .3s"></div></div>
        <span id="poisonArea" style="display:none">🟡 <span id="poisonBar" style="width:40px;height:6px;display:inline-block;background:rgba(255,255,255,0.12);border-radius:3px;overflow:hidden;vertical-align:middle"><span style="display:block;height:100%;background:#ab47bc;border-radius:3px"></span></span></span>
        <span id="statusBadge" style="padding:1px 8px;border-radius:6px;font-size:11px;background:rgba(76,175,80,.2);color:#81c784">🟢 正常</span>
        <span style="margin-left:auto" id="bugCount">🐛 0只</span>
        <span id="timerDisplay">⏱ 0s</span>
        <a href="index.html" style="color:rgba(255,255,255,0.4);text-decoration:none;font-size:11px">✕</a>
      </div>

      <!-- 操作提示 -->
      <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:12px;padding:4px 14px;border-radius:20px;background:rgba(0,0,0,0.35);backdrop-filter:blur(8px);font-size:10px;color:rgba(255,255,255,0.5);pointer-events:none">
        <span><kbd>WASD</kbd> 移动</span>
        <span><kbd>E</kbd> 抄子</span>
        <span><kbd>Q</kbd> 铲子</span>
        <span><kbd>R</kbd> 退出</span>
      </div>

      <div class="game-over-overlay" id="gameOver">
        <h2>🎮 游戏结束</h2>
        <div class="final-score" id="finalScore">0</div>
        <div style="font-size:14px;opacity:.7">最终得分</div>
        <div id="caughtSummary" style="font-size:13px;opacity:.5"></div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn primary" id="replayButton">🔄 再来一局</button>
          <a class="btn" href="index.html">🏠 首页</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
