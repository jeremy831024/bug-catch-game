<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐛 抓虫大冒险 - 游戏</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="game.js"></script>
</head>
<body class="game-page">
  <main class="game-shell">
    <header class="game-topbar">
      <h1 class="game-title">🐛 抓虫大冒险</h1>
      <div class="game-links">
        <a class="btn small-btn" href="collection.html">📖 图鉴</a>
        <a class="btn small-btn" href="index.html">🏠 首页</a>
      </div>
    </header>

    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="960" height="640"></canvas>
      <div class="game-over-overlay" id="gameOver" aria-live="polite">
        <h2>游戏结束</h2>
        <div class="final-score" id="finalScore">0</div>
        <div>最终得分</div>
        <div id="caughtSummary"></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px">
          <button class="btn primary" id="replayButton" type="button">🔄 再来一局</button>
          <a class="btn" href="index.html">🏠 返回首页</a>
        </div>
      </div>
    </div>

    <section class="hud" aria-label="状态栏">
      <div class="hud-item">⭐ <span id="scoreDisplay">0</span></div>
      <div class="hud-item">💪
        <div class="hud-bar hud-stamina"><div class="hud-fill" id="staminaBar"></div></div>
        <span id="staminaText">100</span>
      </div>
      <div class="hud-item" id="poisonArea" style="display:none">🟣
        <div class="hud-bar hud-poison"><div class="hud-fill" id="poisonBar"></div></div>
      </div>
      <div class="status-badge status-ok" id="statusBadge">🟢 正常</div>
      <div class="hud-item" id="bugCount">🐛 0 只</div>
      <div class="hud-item" id="timerDisplay">⏱ 0s</div>
    </section>

    <section class="help-bar" aria-label="操作说明">
      <span><kbd>WASD</kbd> / 方向键移动</span>
      <span><kbd>E</kbd> / 空格抓虫</span>
      <span><kbd>Q</kbd> 洞口挖洞</span>
      <span><kbd>R</kbd> 返回首页</span>
    </section>
  </main>
</body>
</html>
