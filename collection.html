<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📖 昆虫图鉴</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
background:linear-gradient(135deg,#2d5a2d,#1a3a1a);
}
.container{
width:100%;max-width:700px;
background:rgba(255,255,255,.06);backdrop-filter:blur(20px);
border-radius:24px;padding:28px;color:#fff;
border:1px solid rgba(255,255,255,.1);
}
h1{text-align:center;font-size:28px;margin-bottom:20px}
.back{display:inline-block;color:rgba(255,255,255,.5);text-decoration:none;font-size:14px;margin-bottom:12px}
.back:hover{color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{
background:rgba(255,255,255,.08);border-radius:16px;padding:16px;text-align:center;
border:1px solid rgba(255,255,255,.1);transition:.2s;
}
.card.caught{border-color:rgba(100,255,150,.3);background:rgba(100,255,150,.06)}
.card.missing{opacity:.5}
.card .icon{font-size:40px;margin-bottom:8px}
.card .name{font-size:15px;font-weight:600}
.card .rarity{font-size:11px;opacity:.5;margin:2px 0}
.card .pts{font-size:13px}
.card .count{font-size:12px;color:#81c784;margin-top:4px}
.card .desc{font-size:10px;opacity:.4;margin-top:2px}
.poison-badge{display:inline-block;padding:1px 6px;border-radius:6px;background:rgba(171,71,188,.3);font-size:10px;color:#ce93d8}

.empty{text-align:center;opacity:.5;padding:40px;font-size:16px}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back">← 返回首页</a>
  <h1>📖 昆虫图鉴</h1>
  <div class="grid" id="grid"></div>
</div>
<script>
const BUGS=[
  {id:'hopper',name:'蚂蚱',icon:'🦗',rarity:'⭐ 普通',pts:10,psn:false,desc:'会跳的绿色小虫'},
  {id:'mantis',name:'螳螂',icon:'🦟',rarity:'⭐ 普通',pts:15,psn:false,desc:'会埋伏的猎手'},
  {id:'beetle',name:'独角仙',icon:'🪲',rarity:'⭐⭐ 稀有',pts:50,psn:false,desc:'耐力超强'},
  {id:'butterfly',name:'蝴蝶',icon:'🦋',rarity:'⭐⭐ 稀有',pts:30,psn:false,desc:'飞行轨迹飘忽'},
  {id:'cicada',name:'知了',icon:'🦗',rarity:'⭐ 普通',pts:20,psn:false,desc:'夏日鸣叫'},
  {id:'spider',name:'蜘蛛',icon:'🕷️',rarity:'⭐ 普通',pts:25,psn:true,desc:'有毒！小心'},
  {id:'dung',name:'屎壳郎',icon:'💩',rarity:'💀 陷阱',pts:-10,psn:true,desc:'扣分！有毒！'},
];

let caught=JSON.parse(localStorage.getItem('bugRanks')||'[]');
// 从最新记录中提取捕获数
let allCaught={};
for(let r of caught){
  if(r.bugs)for(let[k,v]of Object.entries(r.bugs))allCaught[k]=(allCaught[k]||0)+v;
}

let grid=document.getElementById('grid');
for(let b of BUGS){
  let cnt=allCaught[b.id]||0;
  let c=document.createElement('div');
  c.className='card'+(cnt>0?' caught':' missing');
  c.innerHTML=`
    <div class="icon">${b.icon}</div>
    <div class="name">${b.name}</div>
    <div class="rarity">${b.rarity}</div>
    <div class="pts">${b.pts>0?'+':''}${b.pts}分${b.psn?' <span class="poison-badge">有毒</span>':''}</div>
    ${cnt>0?`<div class="count">✅ 已捕获 ×${cnt}</div>`:'<div class="count" style="opacity:.3">❌ 未捕获</div>'}
    <div class="desc">${b.desc}</div>
  `;
  grid.appendChild(c);
}

if(Object.keys(allCaught).length===0){
  let e=document.createElement('div');
  e.className='empty';e.textContent='还没有抓到任何虫子，快去游戏里抓吧！';
  document.querySelector('.container').appendChild(e);
}
</script>
</body>
</html>
