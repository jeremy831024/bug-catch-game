<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 昆虫图鉴</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="collection-page">
    <section class="collection-shell glass-shell">
      <header class="collection-header">
        <h1>📖 昆虫图鉴</h1>
        <a class="btn small-btn" href="index.html">🏠 首页</a>
      </header>
      <div class="bug-grid" id="bugGrid"></div>
    </section>
  </main>

  <script>
    const BUGS = [
      { id: "grasshopper", name: "蚂蚱", rarity: "⭐ 普通", points: 10, toxic: false, asset: "grasshopper", desc: "会跳跃移动，常从草地洞口钻进钻出。" },
      { id: "mantis", name: "螳螂", rarity: "⭐ 普通", points: 15, toxic: false, asset: "mantis", desc: "静止时半透明，靠近它才会迅速逃开。" },
      { id: "beetle", name: "独角仙", rarity: "⭐⭐ 稀有", points: 50, toxic: false, asset: "beetle", desc: "移动慢但耐力很好，能飞很久。" },
      { id: "butterfly", name: "蝴蝶", rarity: "⭐⭐ 稀有", points: 30, toxic: false, asset: "butterfly", desc: "路线飘忽，像波浪一样飞行。" },
      { id: "cicada", name: "知了", rarity: "⭐ 普通", points: 20, toxic: false, asset: "cicada", desc: "停在地图边缘的树上，会喊“知了”。" },
      { id: "spider", name: "蜘蛛", rarity: "⭐ 少见", points: 25, toxic: true, asset: "spider", desc: "在网内移动很快，碰到会中毒。" },
      { id: "dung", name: "屎壳郎", rarity: "💀 陷阱", points: -10, toxic: true, asset: "dung", desc: "推着粪球移动，碰到会扣分并中毒。" },
    ];

    function readCaught() {
      try {
        const raw = JSON.parse(localStorage.getItem("bugCatchCaught") || "{}");
        return raw && typeof raw === "object" ? raw : {};
      } catch {
        return {};
      }
    }

    function readLegacyCaught() {
      try {
        const ranks = JSON.parse(localStorage.getItem("bugRanks") || "[]");
        return ranks.reduce((acc, item) => {
          if (item.bugs) {
            Object.entries(item.bugs).forEach(([key, value]) => {
              acc[key] = (acc[key] || 0) + value;
            });
          }
          return acc;
        }, {});
      } catch {
        return {};
      }
    }

    const grid = document.getElementById("bugGrid");
    const caught = { ...readLegacyCaught() };
    const current = readCaught();
    Object.entries(current).forEach(([key, value]) => {
      caught[key] = (caught[key] || 0) + value;
    });

    grid.innerHTML = BUGS.map((bug) => {
      const count = caught[bug.id] || 0;
      const points = `${bug.points > 0 ? "+" : ""}${bug.points} 分`;
      return `
        <article class="bug-card ${count ? "caught" : "missing"}">
          <img src="assets/${bug.asset}.png" alt="${bug.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">
          <span class="asset-icon" style="display:none;align-items:center;justify-content:center;font-size:50px">${bug.toxic ? "⚠️" : "🐛"}</span>
          <div class="bug-name">${bug.name}</div>
          <div class="bug-meta">${bug.rarity} · ${points}${bug.toxic ? " · 有毒" : ""}</div>
          <div class="bug-count">${count ? `已捕获 × ${count}` : "未捕获"}</div>
          <div class="bug-desc">${bug.desc}</div>
        </article>
      `;
    }).join("");
  </script>
</body>
</html>
