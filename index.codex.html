<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐛 抓虫大冒险</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
      color: #20513b;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 239, 117, .92) 0 8%, transparent 16%),
        radial-gradient(circle at 78% 20%, rgba(255, 126, 174, .72) 0 9%, transparent 18%),
        radial-gradient(circle at 18% 82%, rgba(88, 219, 255, .72) 0 10%, transparent 20%),
        linear-gradient(135deg, #79e37b 0%, #75d8ff 48%, #ffd86a 100%);
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(120deg, rgba(255,255,255,.22) 0 1px, transparent 1px 92px),
        linear-gradient(30deg, rgba(255,255,255,.18) 0 1px, transparent 1px 86px);
      opacity: .55;
    }
    .shell {
      position: relative;
      z-index: 1;
      width: min(620px, 100%);
      padding: 34px;
      border: 1px solid rgba(255,255,255,.56);
      border-radius: 28px;
      background: rgba(255,255,255,.34);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px rgba(33, 92, 61, .24);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(38px, 8vw, 72px);
      line-height: 1.05;
      letter-spacing: 0;
      color: #144f33;
      text-shadow: 0 4px 0 rgba(255,255,255,.38);
    }
    .subtitle {
      margin: 0 auto 28px;
      max-width: 440px;
      font-size: 18px;
      line-height: 1.7;
      color: rgba(16, 67, 47, .82);
      font-weight: 700;
    }
    .actions {
      display: grid;
      gap: 14px;
      margin: 0 auto;
      max-width: 340px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      padding: 12px 22px;
      border: 1px solid rgba(255,255,255,.72);
      border-radius: 18px;
      color: #16412e;
      background: rgba(255,255,255,.48);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 22px rgba(36, 105, 69, .18);
      text-decoration: none;
      font-size: 21px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .16s ease, background .16s ease, box-shadow .16s ease;
    }
    .btn:hover, .btn:focus-visible {
      transform: translateY(-2px);
      background: rgba(255,255,255,.68);
      box-shadow: 0 15px 28px rgba(36, 105, 69, .22);
      outline: none;
    }
    .btn.primary {
      color: #fff;
      background: linear-gradient(135deg, rgba(25, 173, 95, .92), rgba(255, 171, 48, .92));
      text-shadow: 0 2px 2px rgba(0,0,0,.16);
    }
    .leaderboard {
      display: none;
      margin-top: 24px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,.62);
      border-radius: 18px;
      background: rgba(255,255,255,.32);
      backdrop-filter: blur(14px);
      text-align: left;
    }
    .leaderboard.open { display: block; }
    .leaderboard h2 { margin: 0 0 12px; font-size: 22px; color: #16412e; }
    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,.5);
      font-weight: 800;
    }
    .score-row:first-of-type { border-top: 0; }
    .empty {
      margin: 0;
      padding: 12px 0 2px;
      color: rgba(22, 65, 46, .72);
      font-weight: 700;
      text-align: center;
    }
    .fireflies span {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 142, .94);
      box-shadow: 0 0 18px rgba(255, 255, 142, .9);
      animation: float 7s ease-in-out infinite;
    }
    .fireflies span:nth-child(1) { left: 11%; top: 24%; animation-delay: -.8s; }
    .fireflies span:nth-child(2) { left: 86%; top: 34%; animation-delay: -2.2s; }
    .fireflies span:nth-child(3) { left: 70%; top: 79%; animation-delay: -4.2s; }
    .fireflies span:nth-child(4) { left: 28%; top: 70%; animation-delay: -5.4s; }
    @keyframes float {
      0%, 100% { transform: translate3d(0,0,0) scale(1); opacity: .65; }
      50% { transform: translate3d(16px,-28px,0) scale(1.25); opacity: 1; }
    }
    @media (max-width: 560px) {
      body { padding: 16px; }
      .shell { padding: 24px 18px; border-radius: 24px; }
      .subtitle { font-size: 16px; }
      .btn { min-height: 54px; font-size: 19px; }
    }
  </style>
</head>
<body>
  <div class="fireflies" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
  <main class="shell">
    <h1>🐛 抓虫大冒险</h1>
    <p class="subtitle">带上抄子和小铲子，在草地、山路和池塘边寻找七种奇妙昆虫。</p>
    <nav class="actions" aria-label="主菜单">
      <a class="btn primary" href="game.html">进入游戏</a>
      <a class="btn" href="collection.html">图鉴</a>
      <button class="btn" type="button" id="rankButton">排行榜</button>
    </nav>
    <section class="leaderboard" id="leaderboard" aria-live="polite">
      <h2>🏆 排行榜</h2>
      <div id="scoreList"></div>
    </section>
  </main>

  <script>
    const rankButton = document.getElementById("rankButton");
    const board = document.getElementById("leaderboard");
    const scoreList = document.getElementById("scoreList");

    function readScores() {
      try {
        return JSON.parse(localStorage.getItem("bugCatchScores") || "[]");
      } catch {
        return [];
      }
    }

    function renderScores() {
      const scores = readScores().sort((a, b) => b.score - a.score).slice(0, 8);
      if (!scores.length) {
        scoreList.innerHTML = '<p class="empty">还没有成绩，先进游戏抓几只虫吧。</p>';
        return;
      }
      scoreList.innerHTML = scores.map((item, index) => {
        const date = new Date(item.date || Date.now()).toLocaleDateString("zh-CN");
        return `<div class="score-row"><span>${index + 1}. ${date}</span><strong>${item.score} 分 · ${item.count || 0} 只</strong></div>`;
      }).join("");
    }

    rankButton.addEventListener("click", () => {
      board.classList.toggle("open");
      renderScores();
    });
  </script>
</body>
</html>
